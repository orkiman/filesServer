<html>
<head>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .grid-item {
            text-align: center;
        }
        .thumbnail {
            width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>File Browser</h1>
    <div class="grid">
        {{range .Files}}
            <div class="grid-item">
                {{if .IsDir}}
                    <a href="{{.Path}}">📁 {{.Name}}/</a>
                {{else if .IsImage}}
                    <a href="{{.Path}}">
                        <img class="thumbnail" src="{{.ThumbnailPath}}" alt="{{.Name}}">
                        <br>{{.Name}}
                    </a>
                {{else}}
                    <a href="{{.Path}}">📄 {{.Name}}</a>
                {{end}}
            </div>
        {{end}}
    </div>
</body>
</html>
